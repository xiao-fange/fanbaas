<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重置密码 - FanBaaS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:#020b18;color:#e0f0ff;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 50% 40%,rgba(0,102,255,0.08) 0%,transparent 60%);}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.012) 2px,rgba(0,212,255,0.012) 4px);pointer-events:none;}
.card{background:#061d35;border:1px solid #0a3a5c;border-top:3px solid #00d4ff;border-radius:6px;padding:40px;width:420px;max-width:95vw;box-shadow:0 0 30px rgba(0,212,255,0.2);}
.logo{font-family:'Orbitron',monospace;font-size:18px;color:#00d4ff;letter-spacing:3px;margin-bottom:8px;text-shadow:0 0 20px rgba(0,212,255,0.5);}
.subtitle{font-size:12px;color:#3a6080;margin-bottom:28px;font-family:'Share Tech Mono',monospace;}
h2{font-family:'Orbitron',monospace;font-size:14px;letter-spacing:2px;color:#e0f0ff;margin-bottom:20px;}
label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#3a6080;margin-bottom:6px;}
input{width:100%;padding:11px 14px;background:rgba(2,11,24,0.8);border:1px solid #0a3a5c;border-radius:3px;color:#e0f0ff;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;transition:all 0.2s;margin-bottom:16px;}
input:focus{border-color:#00d4ff;box-shadow:0 0 0 2px rgba(0,212,255,0.15);}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#0066ff,#00d4ff);color:#fff;border:none;border-radius:3px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.btn:hover{box-shadow:0 0 20px rgba(0,212,255,0.4);}
.btn:disabled{opacity:0.5;cursor:not-allowed;}
.msg{padding:10px 14px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:12px;margin-bottom:16px;display:none;}
.msg.error{background:rgba(255,34,68,0.08);border:1px solid rgba(255,34,68,0.3);color:#ff2244;}
.msg.success{background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.3);color:#00ff88;}
.back{text-align:center;margin-top:16px;font-size:12px;color:#3a6080;}
.back a{color:#00d4ff;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">FanBaaS</div>
  <div class="subtitle">by 歪歪 · 公众号：小凡平凡</div>
  <h2>重置密码</h2>
  <div class="msg error" id="err"></div>
  <div class="msg success" id="suc"></div>
  <div id="form-area">
    <label>新密码</label>
    <input type="password" id="pwd" placeholder="至少8位" minlength="8">
    <label>确认新密码</label>
    <input type="password" id="pwd2" placeholder="再次输入新密码" onkeydown="if(event.key==='Enter')submit()">
    <button class="btn" onclick="submit()" id="btn">确认重置</button>
  </div>
  <div class="back"><a href="/">返回首页</a></div>
</div>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('err').textContent = '无效的重置链接，请重新申请';
  document.getElementById('err').style.display = 'block';
  document.getElementById('form-area').style.display = 'none';
}
async function submit() {
  const pwd = document.getElementById('pwd').value;
  const pwd2 = document.getElementById('pwd2').value;
  const err = document.getElementById('err');
  const suc = document.getElementById('suc');
  const btn = document.getElementById('btn');
  err.style.display = 'none'; suc.style.display = 'none';
  if (!pwd || pwd.length < 8) { err.textContent = '密码长度不能少于8位'; err.style.display = 'block'; return; }
  if (pwd !== pwd2) { err.textContent = '两次密码不一致'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = '重置中...';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, newPassword: pwd })
    });
    const d = await r.json();
    if (d.error) { err.textContent = d.error; err.style.display = 'block'; btn.disabled = false; btn.textContent = '确认重置'; return; }
    suc.textContent = d.message + ' 3秒后跳转登录...';
    suc.style.display = 'block';
    document.getElementById('form-area').style.display = 'none';
    setTimeout(() => location.href = '/', 3000);
  } catch { err.textContent = '网络错误'; err.style.display = 'block'; btn.disabled = false; btn.textContent = '确认重置'; }
}
</script>
</body>
</html>
